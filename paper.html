<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboPulse | 机器人学学术脉动</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-bg: #f8fafc;
            --color-primary: #4f46e5;
            --font-main: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        /* 1. Global Lock: Disable browser scrollbar */
        html, body {
            height: 100%;
            overflow: hidden;
            background-color: var(--color-bg);
            font-family: var(--font-main);
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
        }

        /* 2. App Container: Flex Column Full Height */
        #app {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 3. Main Area: Fills remaining space */
        main {
            flex: 1;
            min-height: 0; /* Allow shrinking */
            display: flex; /* To stretch children */
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        
        /* Ensure Transition Wrapper Fills Height */
        .view-container {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Utility Classes */
        .font-display { font-family: var(--font-display); }
        .font-mono { font-family: var(--font-mono); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Animations */
        .list-enter-active, .list-leave-active { transition: all 0.4s ease; }
        .list-enter-from, .list-leave-to { opacity: 0; transform: translateY(20px); }
        
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }

        /* Markdown Styling */
        .prose h1, .prose h2, .prose h3 { font-family: var(--font-display); letter-spacing: -0.02em; }
        .prose blockquote { border-left-color: var(--color-primary); background: #f1f5f9; font-style: normal; }
        .prose strong { color: var(--color-primary); }
    </style>
</head>
<body class="selection:bg-indigo-100 selection:text-indigo-900">

<div id="app">
    <app-header 
        :current-view="view" 
        :syncing="syncing" 
        @change-view="view = $event" 
        @trigger-sync="handleSync">
    </app-header>

    <main>
        <transition name="fade" mode="out-in">
            <component :is="view === 'pulse' ? 'pulse-view' : 'stream-view'"
                :key="view"
                class="view-container"
                :scale="pulseScale"
                :loading="loadingPulse || loadingStream"
                :data="pulseData"
                :current-date="currentDate"
                :today="today"
                :papers="streamPapers"
                @change-scale="changePulseScale"
                @nav-date="handleDateNav"
                @update-date="updateDate"
                @analyze="analyzePaper"
                @load-more="loadMoreStream">
            </component>
        </transition>
    </main>
</div>

<!-- COMPONENT TEMPLATES -->

<!-- Header Template -->
<template id="tpl-app-header">
    <header class="flex-shrink-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-[96rem] mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                    <span class="font-display font-bold text-sm">RP</span>
                </div>
                <h1 class="font-display font-bold text-xl tracking-tight text-slate-900">RoboPulse <span class="text-slate-400 font-normal text-sm ml-2 hidden sm:inline-block">AI-Driven Insights</span></h1>
            </div>

            <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl">
                <button 
                    v-for="v in ['pulse', 'stream']" 
                    :key="v"
                    @click="$emit('change-view', v)"
                    class="px-4 py-1.5 rounded-lg text-xs font-bold uppercase tracking-wider transition-all duration-300"
                    :class="currentView === v ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'">
                    {{ v }}
                </button>
            </div>

            <button 
                @click="$emit('trigger-sync')" 
                :disabled="syncing"
                class="group flex items-center gap-2 px-4 py-2 rounded-xl border border-slate-200 hover:border-indigo-200 hover:bg-indigo-50/50 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="ph" :class="syncing ? 'ph-spinner animate-spin text-indigo-600' : 'ph-arrows-clockwise text-slate-400 group-hover:text-indigo-600'"></i>
                <span class="text-xs font-bold text-slate-600 group-hover:text-indigo-700">{{ syncing ? 'Syncing...' : 'Sync ArXiv' }}</span>
            </button>
        </div>
    </header>
</template>

<!-- Pulse View Template (Split Pane) -->
<template id="tpl-pulse-view">
    <div class="h-full w-full max-w-[96rem] mx-auto px-6 overflow-hidden">
        <div class="grid grid-cols-1 xl:grid-cols-12 gap-12 h-full items-stretch">
            
            <!-- Left Column: Summary (Independent Scroll) -->
            <div class="xl:col-span-5 h-full overflow-y-auto pr-2 pb-20 overscroll-contain">
                <div class="pt-8">
                    <!-- Date & Scale Controls -->
                    <div class="flex flex-col gap-4 mb-8">
                        <div class="flex gap-2 justify-center xl:justify-start">
                            <button v-for="s in ['daily', 'weekly', 'monthly']" :key="s"
                                @click="$emit('change-scale', s)"
                                class="px-5 py-2 rounded-full border text-xs font-bold uppercase tracking-wider transition-all"
                                :class="scale === s ? 'border-indigo-600 bg-indigo-600 text-white shadow-lg shadow-indigo-200' : 'border-slate-200 bg-white text-slate-500 hover:border-slate-300'">
                                {{ s }}
                            </button>
                        </div>
                        
                        <!-- Date Navigation -->
                        <div class="flex items-center gap-3 bg-white border border-slate-200 rounded-xl p-2 shadow-sm w-fit">
                            <button @click="$emit('nav-date', -1)" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-50 text-slate-400 hover:text-indigo-600 transition-colors">
                                <i class="ph ph-caret-left text-lg"></i>
                            </button>
                            
                            <div class="relative group">
                                <span class="text-xs font-mono font-bold text-slate-600 cursor-pointer border-b border-dashed border-slate-300 group-hover:border-indigo-400 group-hover:text-indigo-600 transition-colors py-1">
                                    {{ displayDateLabel }}
                                </span>
                                <!-- Hidden Date Picker trigger -->
                                <input type="date" 
                                       :value="currentDate" 
                                       :max="today"
                                       @input="$emit('update-date', $event.target.value)"
                                       class="absolute inset-0 opacity-0 cursor-pointer w-full h-full" />
                            </div>

                            <button @click="$emit('nav-date', 1)" 
                                    :disabled="currentDate >= today"
                                    class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-50 text-slate-400 hover:text-indigo-600 transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                                <i class="ph ph-caret-right text-lg"></i>
                            </button>
                        </div>
                    </div>

                    <div v-if="loading" class="flex flex-col items-center justify-center py-20 text-center space-y-4">
                        <div class="w-12 h-12 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin"></div>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest animate-pulse">Gemini 1.5 Pro Analyzing...</p>
                    </div>

                    <!-- Content or Empty State -->
                    <div v-else-if="data" :class="{'opacity-50': data.empty}" class="bg-white rounded-3xl border border-slate-200 p-8 shadow-sm mb-10 transition-opacity">
                        <div class="flex items-center justify-between mb-6 pb-6 border-b border-slate-100">
                            <span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-md text-[10px] font-bold uppercase tracking-widest">{{ scale }} Report</span>
                            <span class="font-mono text-xs text-slate-400">{{ data.date_range || data.date }}</span>
                        </div>
                        
                        <div v-if="data.empty" class="text-center py-10">
                            <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-300">
                                <i class="ph ph-files text-3xl"></i>
                            </div>
                            <h2 class="font-display font-bold text-xl text-slate-900 mb-2">No Papers Found</h2>
                            <div class="prose prose-sm prose-slate max-w-none text-slate-500" v-html="renderMarkdown(data.summary_content)"></div>
                        </div>

                        <div v-else>
                            <h2 class="font-display font-bold text-3xl mb-6 text-slate-900 leading-tight">{{ data.title }}</h2>
                            <div class="prose prose-sm prose-slate max-w-none prose-p:leading-relaxed prose-headings:font-display prose-a:text-indigo-600" 
                                 v-html="renderMarkdown(data.summary_content)"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Feed (Independent Scroll) -->
            <div class="xl:col-span-7 h-full overflow-y-auto pr-2 pb-20 overscroll-contain">
                <div class="pt-8">
                    <div class="flex items-center gap-4 mb-8">
                        <h3 class="font-display font-bold text-lg text-slate-900">Editor's Choice</h3>
                        <div class="h-px flex-1 bg-slate-200"></div>
                        <span class="text-xs font-mono text-slate-400">TOP 10</span>
                    </div>
                    
                    <div v-if="!loading && (!data || data.empty || !data.selected_papers || data.selected_papers.length === 0)" class="py-20 text-center border-2 border-dashed border-slate-200 rounded-3xl">
                        <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">No Selection Available</p>
                    </div>

                    <transition-group v-else name="list" tag="div" class="space-y-6">
                        <paper-card 
                            v-for="(paper, idx) in (data?.selected_papers || [])" 
                            :key="paper.id"
                            :paper="paper"
                            :rank="idx + 1"
                            @analyze="$emit('analyze', paper)">
                        </paper-card>
                    </transition-group>
                </div>
            </div>
        </div>
    </div>
</template>

<!-- Stream View Template (Scrollable Container) -->
<template id="tpl-stream-view">
    <div class="h-full overflow-y-auto">
        <div class="max-w-[96rem] mx-auto px-6 py-8 pb-32">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <paper-card 
                    v-for="paper in papers" 
                    :key="paper.id"
                    :paper="paper"
                    @analyze="$emit('analyze', paper)">
                </paper-card>
            </div>
            
            <div class="py-20 text-center">
                <button 
                    v-if="!loading" 
                    @click="$emit('load-more')"
                    class="px-8 py-3 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:border-indigo-300 hover:text-indigo-600 hover:shadow-lg hover:shadow-indigo-50 transition-all">
                    Load More Papers
                </button>
                <div v-else class="inline-block w-8 h-8 border-2 border-slate-200 border-t-indigo-600 rounded-full animate-spin"></div>
            </div>
        </div>
    </div>
</template>

<!-- Paper Card Template (Unchanged Logic, just styling) -->
<template id="tpl-paper-card">
    <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-[0_2px_8px_rgba(0,0,0,0.02)] hover:shadow-[0_8px_24px_rgba(79,70,229,0.08)] hover:border-indigo-100 transition-all duration-300 group flex flex-col h-full">
        <!-- Header -->
        <div class="flex justify-between items-start mb-4">
            <div class="flex gap-2">
                <span v-if="rank" class="bg-indigo-600 text-white px-2 py-0.5 rounded text-[10px] font-bold font-mono">#{{ rank }}</span>
                <span class="bg-slate-100 text-slate-500 px-2 py-0.5 rounded text-[10px] font-bold font-mono">{{ paper.published_date }}</span>
            </div>
            <a :href="paper.pdf_link" target="_blank" class="text-slate-300 hover:text-rose-500 transition-colors" title="Download PDF">
                <i class="ph ph-file-pdf text-lg"></i>
            </a>
        </div>

        <!-- Title & Authors -->
        <h3 class="font-display font-bold text-lg leading-snug mb-2 text-slate-900 group-hover:text-indigo-600 transition-colors cursor-pointer"
            @click="expanded = !expanded">
            {{ paper.title }}
        </h3>
        <div class="text-xs text-slate-500 font-medium mb-4 line-clamp-1 group-hover:line-clamp-none transition-all">
            {{ formatAuthors(paper.authors) }}
        </div>

        <!-- Tags -->
        <div class="flex flex-wrap gap-1.5 mb-6">
            <span v-for="tag in paper.tags" :key="tag" 
                  class="px-2 py-0.5 rounded-md bg-slate-50 border border-slate-100 text-[10px] font-bold text-slate-500 uppercase tracking-tight">
                {{ tag }}
            </span>
        </div>

        <div class="mt-auto pt-4 border-t border-slate-50 flex justify-between items-center">
            <button 
                @click="handleAnalyze"
                class="flex items-center gap-1.5 text-xs font-bold px-3 py-1.5 rounded-lg transition-colors"
                :class="paper.vlm_analysis ? 'bg-indigo-50 text-indigo-600' : 'bg-slate-50 text-slate-600 hover:bg-indigo-50 hover:text-indigo-600'">
                <i class="ph" :class="localAnalyzing ? 'ph-spinner animate-spin' : 'ph-sparkle'"></i>
                {{ paper.vlm_analysis ? 'Deep Dive' : 'Analyze' }}
            </button>
            
            <button @click="expanded = !expanded" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-50 text-slate-400 hover:text-slate-600 transition-colors">
                <i class="ph" :class="expanded ? 'ph-caret-up' : 'ph-caret-down'"></i>
            </button>
        </div>

        <!-- Expandable Area -->
        <transition 
            enter-active-class="transition-all duration-300 ease-out overflow-hidden"
            leave-active-class="transition-all duration-200 ease-in overflow-hidden"
            enter-from-class="max-h-0 opacity-0"
            enter-to-class="max-h-[1000px] opacity-100"
            leave-from-class="max-h-[1000px] opacity-100"
            leave-to-class="max-h-0 opacity-0">
            
            <div v-if="expanded" class="mt-4 overflow-hidden">
                <!-- Abstract -->
                <div class="bg-slate-50 rounded-xl p-4 text-sm text-slate-600 leading-relaxed text-justify border border-slate-100">
                    <span class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Abstract</span>
                    {{ paper.abstract }}
                </div>

                <!-- VLM Analysis -->
                <div v-if="localAnalyzing || paper.vlm_analysis" class="mt-4">
                     <div v-if="paper.vlm_analysis" class="bg-indigo-50/50 rounded-xl p-4 border border-indigo-100">
                        <div class="markdown-body prose prose-sm prose-indigo max-w-none" v-html="renderMarkdown(paper.vlm_analysis)"></div>
                     </div>
                     <div v-else-if="localAnalyzing" class="space-y-3 p-4 border border-slate-100 rounded-xl bg-white">
                        <div class="h-4 bg-slate-100 rounded w-3/4 animate-pulse"></div>
                        <div class="h-4 bg-slate-100 rounded w-full animate-pulse"></div>
                        <div class="h-4 bg-slate-100 rounded w-5/6 animate-pulse"></div>
                     </div>
                </div>
            </div>
        </transition>
    </div>
</template>

<script>
    const { createApp, ref, onMounted, defineComponent } = Vue;

    // Utils
    const renderMarkdown = (text) => marked.parse(text || '');
    const formatAuthors = (authors) => {
        if (!authors || authors.length === 0) return 'Unknown Authors';
        return authors.length > 3 ? authors.slice(0, 3).join(', ') + ' et al.' : authors.join(', ');
    };

    // --- Components ---

    const AppHeader = defineComponent({
        template: '#tpl-app-header',
        props: ['currentView', 'syncing'],
        emits: ['change-view', 'trigger-sync']
    });

    const PaperCard = defineComponent({
        template: '#tpl-paper-card',
        props: ['paper', 'rank'],
        emits: ['analyze'],
        setup(props, { emit }) {
            const expanded = ref(false);
            const localAnalyzing = ref(false);
            const handleAnalyze = async () => {
                expanded.value = true;
                if (props.paper.vlm_analysis) return;
                localAnalyzing.value = true;
                emit('analyze'); 
            };
            return { expanded, localAnalyzing, handleAnalyze, renderMarkdown, formatAuthors };
        },
        watch: {
            'paper.vlm_analysis'(newVal) { if(newVal) this.localAnalyzing = false; },
            'paper.analyzing'(newVal) { this.localAnalyzing = newVal; }
        }
    });

    const PulseView = defineComponent({
        template: '#tpl-pulse-view',
        components: { PaperCard },
        props: ['scale', 'loading', 'data', 'currentDate', 'today'], // Add today prop
        emits: ['change-scale', 'analyze', 'nav-date', 'update-date'], 
        setup(props) { 
            const { computed } = Vue;
            const displayDateLabel = computed(() => {
                if(props.data && props.data.date_range) return props.data.date_range;
                return props.currentDate;
            });
            return { renderMarkdown, displayDateLabel };
        }
    });

    const StreamView = defineComponent({
        template: '#tpl-stream-view',
        components: { PaperCard },
        props: ['papers', 'loading'],
        emits: ['load-more', 'analyze']
    });

    // --- Main App ---

    createApp({
        components: { AppHeader, PulseView, StreamView },
        setup() {
            const view = ref('pulse');
            const pulseScale = ref('daily');
            const pulseData = ref(null);
            const loadingPulse = ref(false);
            const streamPapers = ref([]);
            const streamPage = ref(0);
            const loadingStream = ref(false);
            const syncing = ref(false);
            
            // Date State
            const today = new Date().toISOString().split('T')[0];
            const currentDate = ref(today);

            // Data Fetching
            const loadPulse = async () => {
                loadingPulse.value = true;
                pulseData.value = null; // Clear prev data
                try {
                    const res = await fetch(`/api/pulse/${pulseScale.value}?date=${currentDate.value}`);
                    const data = await res.json();
                    if(data.selected_papers) {
                        data.selected_papers = data.selected_papers.map(p => ({...p, expanded: false, analyzing: false}));
                    }
                    pulseData.value = data;
                } catch (e) { console.error(e); }
                finally { loadingPulse.value = false; }
            };

            const changePulseScale = (s) => {
                pulseScale.value = s;
                // Reset date to today when changing scale
                currentDate.value = today;
                loadPulse();
            };

            const handleDateNav = (direction) => {
                const date = new Date(currentDate.value);
                const nextDate = new Date(date);
                
                if (pulseScale.value === 'daily') {
                    nextDate.setDate(date.getDate() + direction);
                } else if (pulseScale.value === 'weekly') {
                    nextDate.setDate(date.getDate() + (direction * 7));
                } else if (pulseScale.value === 'monthly') {
                    nextDate.setMonth(date.getMonth() + direction);
                }
                
                const nextDateStr = nextDate.toISOString().split('T')[0];
                if (nextDateStr > today) return; // Prevent future navigation

                currentDate.value = nextDateStr;
                loadPulse();
            };

            const updateDate = (newDate) => {
                if (newDate > today) return;
                currentDate.value = newDate;
                loadPulse();
            };

            const loadStream = async () => {
                loadingStream.value = true;
                try {
                    const res = await fetch(`/api/stream?page=${streamPage.value}`);
                    const data = await res.json();
                    streamPapers.value = [...streamPapers.value, ...data.map(p => ({...p, expanded: false, analyzing: false}))];
                    streamPage.value++;
                } catch (e) { console.error(e); }
                finally { loadingStream.value = false; }
            };

            const handleSync = async () => {
                syncing.value = true;
                try {
                    await fetch('/api/sync', { method: 'POST' });
                    // Refresh current view
                    if (view.value === 'pulse') loadPulse();
                    else {
                        streamPage.value = 0;
                        streamPapers.value = [];
                        loadStream();
                    }
                } catch(e) { alert("Sync failed"); }
                finally { syncing.value = false; }
            };

            const analyzePaper = async (paper) => {
                if (paper.vlm_analysis) return;
                paper.analyzing = true; // Reactive update
                try {
                    const res = await fetch(`/api/analyze/${paper.id}`, { method: 'POST' });
                    const data = await res.json();
                    paper.vlm_analysis = data.analysis;
                } catch (e) { alert("Analysis failed"); }
                finally { paper.analyzing = false; }
            };

            onMounted(() => {
                loadPulse();
                loadStream();
            });

            return {
                view, pulseScale, pulseData, loadingPulse, currentDate, today,
                streamPapers, loadingStream, syncing,
                changePulseScale, handleDateNav, updateDate,
                loadMoreStream: loadStream,
                handleSync, analyzePaper
            };
        }
    }).mount('#app');
</script>
</body>
</html>
